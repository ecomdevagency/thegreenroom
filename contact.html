    <style>
        .texture-bg {
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.03"/></svg>');
        }
        body {
            min-height: max(884px, 100dvh);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }

    <!-- Shared dynamic store manager script -->
    <script src="store.js" defer></script>

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col texture-bg">

<!-- TopAppBar -->
<header class="bg-surface flex justify-between items-center px-margin-mobile md:px-margin-desktop w-full h-16 sticky top-0 z-50 transition-all duration-300 border-b border-outline/10">
    <div class="flex items-center">
        <button aria-label="Menu" class="text-primary p-sm focus:outline-none rounded-full hover:bg-surface-container-highest transition-colors">
            <span class="material-symbols-outlined" style="font-size: 24px;">menu</span>
        </button>
    </div>
    <div class="text-center flex-1">
        <a href="index.html">
            <span class="font-fredoka font-semibold text-[22px] text-primary tracking-tight">The Green Room</span>
        </a>
    </div>
    <div class="flex items-center gap-sm">
        <button aria-label="Shopping Bag" class="text-primary p-sm focus:outline-none hover:opacity-80 transition-opacity rounded-full hover:bg-surface-container-highest">
            <span class="material-symbols-outlined" style="font-size: 24px;">shopping_bag</span>
        </button>
    </div>
</header>

<!-- Main Content -->
<main class="flex-grow px-margin-mobile pt-lg pb-xl max-w-[600px] mx-auto w-full">
    <!-- Hero Section -->
    <section class="mb-lg text-center animate-fade-in-up">
        <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold mb-sm">Contact Us</h1>
        <p class="font-body-md text-body-md text-on-surface-variant max-w-[300px] mx-auto leading-relaxed text-sm">
            We'd love to hear from you. Drop us a message and we'll get back to you shortly.
        </p>
    </section>

    <!-- Form Section -->
    <section class="bg-surface-container-low p-gutter rounded-xl shadow-[0_4px_24px_rgba(0,104,56,0.04)] mb-lg relative overflow-hidden group border border-outline-variant/10">
        <div class="absolute inset-0 bg-gradient-to-br from-surface to-surface-container-low opacity-50 z-0"></div>
        <form class="flex flex-col gap-gutter relative z-10">
            <div class="flex flex-col gap-xs">
                <label class="font-label-md text-label-md text-on-surface-variant font-semibold" for="name">Name</label>
                <input class="w-full bg-surface-bright border-0 border-b border-primary/20 rounded-t-DEFAULT px-sm py-[14px] font-body-md text-on-surface focus:outline-none focus:ring-0 focus:border-primary focus:bg-surface transition-all placeholder:text-on-surface-variant/50" id="name" name="name" placeholder="Jane Doe" required type="text">
            </div>
            <div class="flex flex-col gap-xs">
                <label class="font-label-md text-label-md text-on-surface-variant font-semibold" for="email">Email</label>
                <input class="w-full bg-surface-bright border-0 border-b border-primary/20 rounded-t-DEFAULT px-sm py-[14px] font-body-md text-on-surface focus:outline-none focus:ring-0 focus:border-primary focus:bg-surface transition-all placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="jane@example.com" required type="email">
            </div>
            <div class="flex flex-col gap-xs">
                <label class="font-label-md text-label-md text-on-surface-variant font-semibold" for="message">Message</label>
                <textarea class="w-full bg-surface-bright border-0 border-b border-primary/20 rounded-t-DEFAULT px-sm py-[14px] font-body-md text-on-surface focus:outline-none focus:ring-0 focus:border-primary focus:bg-surface transition-all resize-none placeholder:text-on-surface-variant/50" id="message" name="message" placeholder="How can we help you?" required rows="4"></textarea>
            </div>
            <button class="w-full bg-primary text-on-primary font-label-md text-label-md py-[16px] rounded-full hover:bg-[#003d20] transition-all mt-sm shadow-md flex justify-center items-center gap-xs active:scale-95 duration-200" type="submit">
                <span>Send Message</span>
                <span class="material-symbols-outlined text-[18px]">send</span>
            </button>
        </form>
    </section>

    <!-- Contact Info & Socials -->
    <section class="flex flex-col gap-md text-center">
        <div class="flex flex-col items-center gap-sm">
            <a class="font-body-md text-body-md text-primary hover:text-primary-container transition-colors inline-flex items-center gap-xs font-semibold" href="mailto:hello@thegreenroom.com">
                <span class="material-symbols-outlined text-[20px]">mail</span>
                hello@thegreenroom.com
            </a>
        </div>
        <div class="flex justify-center gap-gutter pt-sm">
            <a aria-label="Instagram" class="text-on-surface-variant hover:text-primary transition-colors p-xs bg-surface-container-highest rounded-full w-10 h-10 flex items-center justify-center border border-outline-variant/10 shadow-sm" href="#">

                </svg>
            </a>
            <a aria-label="Pinterest" class="text-on-surface-variant hover:text-primary transition-colors p-xs bg-surface-container-highest rounded-full w-10 h-10 flex items-center justify-center border border-outline-variant/10 shadow-sm" href="#">
                <svg aria-hidden="true" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path clip-rule="evenodd" d="M12.017 0C5.396 0 .029 5.367.029 11.987c0 5.079 3.158 9.417 7.618 11.162-.105-.949-.199-2.403.041-3.439.219-.937 1.406-5.957 1.406-5.957s-.359-.72-.359-1.781c0-1.663.967-2.911 2.168-2.911 1.024 0 1.518.769 1.518 1.688 0 1.029-.653 2.567-.992 3.992-.285 1.193.6 2.165 1.775 2.165 2.128 0 3.768-2.245 3.768-5.487 0-2.861-2.063-4.869-5.008-4.869-3.41 0-5.409 2.562-5.409 5.199 0 1.033.394 2.143.889 2.741.099.12.112.225.085.345-.09.375-.293 1.199-.334 1.363-.053.225-.172.271-.401.165-1.495-.69-2.433-2.878-2.433-4.646 0-3.776 2.748-7.252 7.92-7.252 4.158 0 7.392 2.967 7.392 6.923 0 4.135-2.607 7.462-6.233 7.462-1.214 0-2.354-.629-2.758-1.379l-.749 2.848c-.269 1.045-1.004 2.352-1.498 3.146 1.123.345 2.306.535 3.55.535 6.607 0 11.985-5.365 11.985-11.987C23.97 5.367 18.633 0 12.017 0z" fill-rule="evenodd"></path>
                </svg>
            </a>
        </div>
    </section>
</main>

<!-- Footer -->
<footer class="bg-surface-container-highest dark:bg-inverse-surface flex flex-col md:flex-row justify-between items-center px-margin-mobile md:px-margin-desktop py-xl w-full gap-md mt-auto border-t border-outline/10">
    <div class="font-headline-sm text-headline-sm font-bold text-primary mb-sm md:mb-0">
        The Green Room
    </div>
    <nav class="flex flex-col md:flex-row gap-gutter items-center">
        <a class="text-on-surface-variant hover:text-primary transition-all font-label-md text-sm" href="#">Privacy Policy</a>
        <a class="text-on-surface-variant hover:text-primary transition-all font-label-md text-sm" href="#">Shipping &amp; Returns</a>
        <a class="text-on-surface-variant hover:text-primary transition-all font-label-md text-sm" href="#">Sustainability Report</a>
        <a class="text-primary underline hover:text-primary transition-all font-label-md text-sm translate-y-[-1px]" href="#">FAQ</a>
    </nav>
    <div class="text-on-surface-variant font-body-md text-body-md text-center md:text-left mt-md md:mt-0 opacity-80 text-xs">
        © 2024 The Green Room. Consciously Crafted in Bahrain.
    </div>
</footer>



<script>
    // Subtle focus styles for form elements
    const inputs = document.querySelectorAll('input, textarea');
    inputs.forEach(input => {
        input.addEventListener('focus', () => {
            input.parentElement.classList.add('text-primary');
        });
        input.addEventListener('blur', () => {
            input.parentElement.classList.remove('text-primary');
        });
    });
</script>

</body>
</html>
